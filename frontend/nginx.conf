server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Opciones de CORS locales (por si necesitas llamarlo desde afuera)
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE';
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
    
    # Manejar el enrutamiento de React y desactivar caché para index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Para los assets estáticos (JS/CSS con hash): caché por 1 año y 404 estricto
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy para el Backend (API)
    location /api/ {
        # Reescribe cualquier header necesario para FastAPI / uvicorn
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        
        # Headers importantes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deshabilitar logs para favicon.ico
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
